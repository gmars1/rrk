name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  gather-artifacts:
    name: Gather Build Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      actions: read   
    steps:
      - name: Find latest build
        id: find-build
        uses: actions/github-script@v7
        with:
          script: |
            const workflowName = 'build.yml'; 
            
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowName,
              branch: 'master',
              status: 'success',
              per_page: 1
            });
            
            if (runs.data.workflow_runs.length === 0) {
              core.setFailed(`No successful build found on master branch for workflow: ${workflowName}`);
              return;
            }
            
            const runId = runs.data.workflow_runs[0].id;
            core.setOutput('run-id', runId);
            console.log(`Found build run: ${runId}`);

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ steps.find-build.outputs.run-id }}
          github-token: ${{ github.token }}
          path: artifacts/

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts/ -type f
          echo "==========================="

      - name: Flatten and rename artifacts
        run: |
          mkdir -p release-assets/
          for dir in artifacts/*/; do
            artifact_name="$(basename "$dir")"
            for file in "$dir"*; do
              base="$(basename "$file")"
              if [[ "$base" == *.* ]]; then
                cp "$file" "release-assets/${artifact_name}.${base##*.}"
              else
                cp "$file" "release-assets/${artifact_name}"
              fi
            done
          done
          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release-assets/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}